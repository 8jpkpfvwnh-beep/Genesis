<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G & A Wedding</title>
    <style>
        :root {
            --sand: #d7c4a3; 
            --off-white: #fdfcfb;
            --text: #4a4a4a;
            --accent: #b5a181;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", serif; 
            background: var(--off-white); 
            color: var(--text); 
            text-align: center; 
            margin: 0; 
            padding: 0; 
        }
        .header { padding: 60px 20px; background: white; border-bottom: 1px solid var(--sand); }
        h1 { font-weight: 300; letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; }
        .date { font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Main Featured Image */
        .featured-img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin-top: 20px;
            margin-bottom: 20px; 
            border: 1px solid var(--sand); 
        }

        /* Photo Gallery Styling */
        .gallery { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin: 30px 0; 
        }
        .gallery img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 8px; 
            border: 1px solid var(--sand);
        }

        .card { background: white; border-radius: 2px; padding: 30px; margin-bottom: 20px; border: 1px solid #eee; }
        .btn { 
            display: inline-block; 
            background: var(--sand); 
            color: white; 
            padding: 15px 35px; 
            border-radius: 0; 
            text-decoration: none; 
            margin-top: 15px;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        .btn:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Genesis & Alexis</h1>
        <div class="date">10 . 13 . 2026</div>
    </div>

    <div class="container">
        <!-- Highlighting your favorite photo as the main header -->
        <img src="image_6.png" alt="Genesis and Alexis" class="featured-img">

        <div class="card">
            <h3>The Celebration</h3>
            <p>Tuesday, October 13, 2026</p>
            <p>11559 W Lee Ln<br>Youngtown, AZ 85363</p>
            <a href="https://maps.google.com/?q=11559+W+Lee+Ln+Youngtown+AZ+85363" class="btn">VIEW MAP</a>
        </div>

        <h3>Our Memories</h3>
        <div class="gallery">
            <img src="image_2.png" alt="Wedding Memory 1">
            <img src="image_3.png" alt="Wedding Memory 2">
            <img src="image_4.png" alt="Wedding Memory 3">
            <img src="image_5.png" alt="Wedding Memory 4">
            <img src="image_7.png" alt="Wedding Memory 5">
        </div>

        <div class="card">
            <h3>RSVP</h3>
            <p>We look forward to celebrating with you.</p>
            <a href="#" class="btn">KINDLY RESPOND</a>
        </div>
    </div>

</body>
</html>
